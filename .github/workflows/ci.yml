name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (theme -> brand-assets -> ui -> cli)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check
