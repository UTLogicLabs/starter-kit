name: Publish

on:
  push:
    tags:
      - 'theme-v*'
      - 'brand-assets-v*'
      - 'ui-v*'
      - 'cli-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Resolve package directory from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          case "$TAG" in
            theme-v*) DIR="packages/theme" ;;
            brand-assets-v*) DIR="packages/brand-assets" ;;
            ui-v*) DIR="packages/ui" ;;
            cli-v*) DIR="cli" ;;
            *) echo "Unrecognized tag: $TAG" && exit 1 ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify tag version matches package.json
        run: |
          DIR="${{ steps.pkg.outputs.dir }}"
          TAG="${{ steps.pkg.outputs.tag }}"
          TAG_VERSION="${TAG##*-v}"
          PKG_VERSION=$(node -p "require('./$DIR/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match $DIR/package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
