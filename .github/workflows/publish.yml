name: Publish (manual tag)

# Fallback path: push a tag by hand (e.g. re-publishing a hotfix) to trigger a
# publish without going through the automatic release-on-merge flow.
# Note: tags pushed by release.yml's GITHUB_TOKEN do NOT re-trigger this
# workflow (GitHub Actions doesn't chain workflow runs off its own token) —
# release.yml publishes directly instead of relying on this trigger.
on:
  push:
    tags:
      - 'theme-v*'
      - 'brand-assets-v*'
      - 'ui-v*'
      - 'cli-v*'

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      dir: ${{ steps.pkg.outputs.dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package directory from tag and verify version
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          case "$TAG" in
            theme-v*) DIR="packages/theme" ;;
            brand-assets-v*) DIR="packages/brand-assets" ;;
            ui-v*) DIR="packages/ui" ;;
            cli-v*) DIR="cli" ;;
            *) echo "Unrecognized tag: $TAG" && exit 1 ;;
          esac
          TAG_VERSION="${TAG##*-v}"
          PKG_VERSION=$(node -p "require('./$DIR/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match $DIR/package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    uses: ./.github/workflows/publish-package.yml
    with:
      package_dir: ${{ needs.resolve.outputs.dir }}
    secrets: inherit
